# Hexalith FrontShell CI Pipeline
#
# Triggers on pull requests (opened/synchronize) and pushes to main.
# Runs: checkout (with submodules) ‚Üí pnpm install ‚Üí build ‚Üí lint ‚Üí test
#
# SETUP:
# 1. Turborepo Remote Caching (optional, improves speed):
#    - Go to GitHub repo ‚Üí Settings ‚Üí Secrets and variables ‚Üí Actions
#    - Add secret: TURBO_TOKEN (from Vercel ‚Üí Settings ‚Üí Tokens)
#    - Add variable: TURBO_TEAM (your Vercel team slug)
#    Without these, CI still works ‚Äî just without remote caching.

name: CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Reads pnpm version from package.json "packageManager" field

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ‚îÄ‚îÄ‚îÄ Build ‚îÄ‚îÄ‚îÄ
      - name: Build
        id: build
        run: |
          START_SECONDS=$SECONDS
          pnpm turbo build
          echo "duration=$(( SECONDS - START_SECONDS ))" >> "$GITHUB_OUTPUT"

      # ‚îÄ‚îÄ‚îÄ Lint ‚îÄ‚îÄ‚îÄ
      - name: Lint
        run: pnpm lint

      # ‚îÄ‚îÄ‚îÄ Test ‚îÄ‚îÄ‚îÄ
      - name: Test
        run: pnpm turbo test

      # ‚îÄ‚îÄ‚îÄ Build duration tracking & regression detection ‚îÄ‚îÄ‚îÄ
      - name: Restore build time history
        id: build-history
        uses: actions/cache@v4
        with:
          path: .build-times.json
          key: build-times-${{ runner.os }}

      - name: Check build time regression
        run: |
          DURATION=${{ steps.build.outputs.duration }}
          FILE=".build-times.json"

          # Initialize history if missing
          if [ ! -f "$FILE" ]; then
            echo "[]" > "$FILE"
          fi

          HISTORY=$(cat "$FILE")
          COUNT=$(echo "$HISTORY" | jq 'length')

          if [ "$COUNT" -gt 0 ]; then
            AVG=$(echo "$HISTORY" | jq '[.[] | .duration] | add / length | floor')
            if [ "$AVG" -gt 0 ]; then
              THRESHOLD=$(( AVG * 120 / 100 ))
              if [ "$DURATION" -gt "$THRESHOLD" ]; then
                PERCENT=$(( (DURATION - AVG) * 100 / AVG ))
                echo "::warning::Build time regressed ${PERCENT}% (${DURATION}s vs ${AVG}s average)"
              fi
            fi
          else
            echo "First build recorded ‚Äî no baseline for regression check"
          fi

          # Append current duration and trim to last 10 entries
          UPDATED=$(echo "$HISTORY" | jq --argjson d "$DURATION" --arg s "${{ github.sha }}" \
            '. + [{"duration": $d, "sha": $s}] | .[-10:]')
          echo "$UPDATED" > "$FILE"

      # ‚îÄ‚îÄ‚îÄ Artifact upload (main only) ‚îÄ‚îÄ‚îÄ
      - name: Upload production build
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/upload-artifact@v4
        with:
          name: shell-build-${{ github.sha }}
          path: apps/shell/dist/
          retention-days: 90
