# Hexalith FrontShell CI Pipeline
#
# Triggers on pull requests (opened/synchronize) and pushes to main.
# Full gate sequence: checkout → install → manifest typecheck → build → lint →
# test with coverage → scaffold smoke → storybook → playwright CT → design system health
#
# Main branch additionally: Docker image build, build time regression, artifact upload
#
# SETUP:
# 1. Turborepo Remote Caching (optional, improves speed):
#    - Go to GitHub repo → Settings → Secrets and variables → Actions
#    - Add secret: TURBO_TOKEN (from Vercel → Settings → Tokens)
#    - Add variable: TURBO_TEAM (your Vercel team slug)
#    Without these, CI still works — just without remote caching.

name: CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Reads pnpm version from package.json "packageManager" field

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Peer Dependency Validation ───
      # Ensures module peerDependency ranges match workspace package versions
      - name: Check Peer Dependencies
        run: bash scripts/check-peer-deps.sh

      # ─── Manifest Type Check (fail early on manifest type errors) ───
      # Two-tier validation: (1) TypeScript type-check here, (2) semantic validation via Vite plugin at build
      - name: Manifest Type Check
        run: cd apps/shell && pnpm tsc --project tsconfig.build.json --noEmit

      # ─── Build ───
      - name: Build
        id: build
        run: |
          START_SECONDS=$SECONDS
          pnpm turbo build
          echo "duration=$(( SECONDS - START_SECONDS ))" >> "$GITHUB_OUTPUT"

      # ─── Lint ───
      - name: Lint
        id: lint
        run: pnpm lint

      # ─── Test with Coverage ───
      # Vitest thresholds (per-package vitest.config.ts) fail the step if below threshold.
      # Foundation packages (shell-api, cqrs-client, ui): 95% threshold
      # Apps and tools: 80% threshold
      - name: Test with Coverage
        run: pnpm turbo test -- --coverage

      # ─── Scaffold Smoke Test ───
      # Verifies create-hexalith-module produces compilable, testable output
      - name: Scaffold Smoke Test
        run: bash scripts/scaffold-smoke-test.sh

      # ─── Storybook Build ───
      - name: Build Storybook
        run: pnpm --filter @hexalith/ui build-storybook

      # ─── Playwright Component Tests (a11y) ───
      - name: Install Playwright Browsers
        run: pnpx playwright install --with-deps chromium

      - name: Playwright Component Tests
        id: playwright_ct
        run: pnpm --filter @hexalith/ui test:ct

      # ─── Design System Health Gate ───
      # Outputs health-report.json for PR step summary
      - name: Design System Health
        if: always()
        env:
          LINT_STATUS: ${{ steps.lint.outcome }}
          A11Y_STATUS: ${{ steps.playwright_ct.outcome }}
        run: |
          pnpm --filter @hexalith/ui health
          bash scripts/post-health-comment.sh

      # ─── Turborepo Remote Cache Status ───
      - name: Report Remote Cache Status
        if: env.TURBO_TOKEN != ''
        run: |
          echo "Turborepo remote caching is active (team: $TURBO_TEAM)" >> "$GITHUB_STEP_SUMMARY"

      # ─── Build duration tracking & regression detection ───
      - name: Restore build time history
        if: github.ref == 'refs/heads/main'
        id: build-history
        uses: actions/cache/restore@v4
        with:
          path: .build-times.json
          key: build-times-${{ runner.os }}-main-${{ github.sha }}
          restore-keys: |
            build-times-${{ runner.os }}-main-

      - name: Check build time regression
        if: github.ref == 'refs/heads/main'
        run: |
          DURATION=${{ steps.build.outputs.duration }}
          FILE=".build-times.json"

          # Initialize history if missing
          if [ ! -f "$FILE" ]; then
            echo "[]" > "$FILE"
          fi

          HISTORY=$(cat "$FILE")
          COUNT=$(echo "$HISTORY" | jq 'length')

          if [ "$COUNT" -gt 0 ]; then
            AVG=$(echo "$HISTORY" | jq '[.[] | .duration] | add / length | floor')
            if [ "$AVG" -gt 0 ]; then
              THRESHOLD=$(( AVG * 120 / 100 ))
              if [ "$DURATION" -gt "$THRESHOLD" ]; then
                PERCENT=$(( (DURATION - AVG) * 100 / AVG ))
                echo "::warning::Build time regressed ${PERCENT}% (${DURATION}s vs ${AVG}s average)"
              fi
            fi
          else
            echo "First build recorded — no baseline for regression check"
          fi

          # Append current duration and trim to last 10 entries
          UPDATED=$(echo "$HISTORY" | jq --argjson d "$DURATION" --arg s "${{ github.sha }}" \
            '. + [{"duration": $d, "sha": $s}] | .[-10:]')
          echo "$UPDATED" > "$FILE"

      - name: Save build time history
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/cache/save@v4
        with:
          path: .build-times.json
          key: build-times-${{ runner.os }}-main-${{ github.sha }}

      # ─── Docker Image Build (main only) ───
      # Build and verify the Docker image. Push to registry is out of scope (future story).
      - name: Build Docker Image
        if: github.ref == 'refs/heads/main' && success()
        run: |
          docker build -t hexalith-frontshell:${{ github.sha }} .
          docker tag hexalith-frontshell:${{ github.sha }} hexalith-frontshell:latest

      # ─── Artifact upload (main only) ───
      - name: Upload production build
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/upload-artifact@v4
        with:
          name: shell-build-${{ github.sha }}
          path: apps/shell/dist/
          retention-days: 90
